<svg xmlns="http://www.w3.org/2000/svg" width="980" height="260" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">Higher-order function</title>
  <desc id="desc">A function takes another function as input and returns a new function or result.</desc>
  <rect width="980" height="260" rx="18" fill="#f8fcf9"/>
  <g font-family="Arial, sans-serif">
    <rect x="62" y="82" width="180" height="96" rx="14" fill="#ffffff" stroke="#8cc6a1" stroke-width="2"/>
    <rect x="382" y="82" width="216" height="96" rx="14" fill="#ffffff" stroke="#8cc6a1" stroke-width="2"/>
    <rect x="742" y="82" width="176" height="96" rx="14" fill="#ffffff" stroke="#8cc6a1" stroke-width="2"/>
    <text x="152" y="126" text-anchor="middle" font-size="24" font-weight="700" fill="#245b3f">Function A</text>
    <text x="490" y="124" text-anchor="middle" font-size="22" font-weight="700" fill="#245b3f">Takes a function</text>
    <text x="490" y="150" text-anchor="middle" font-size="22" font-weight="700" fill="#245b3f">as input</text>
    <text x="830" y="126" text-anchor="middle" font-size="24" font-weight="700" fill="#245b3f">Function B</text>
    <line x1="244" y1="130" x2="366" y2="130" stroke="#4aa26f" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="618" y1="130" x2="726" y2="130" stroke="#4aa26f" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="305" y="105" text-anchor="middle" font-size="18" fill="#4b7259">callback</text>
    <text x="671" y="105" text-anchor="middle" font-size="18" fill="#4b7259">returns</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4aa26f"/>
    </marker>
  </defs>
</svg>
