<svg xmlns="http://www.w3.org/2000/svg" width="980" height="260" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">Function relation graph</title>
  <desc id="desc">Input data flows through functions and becomes output data through reusable relations.</desc>
  <rect width="980" height="260" rx="18" fill="#f7fbff"/>
  <g font-family="Arial, sans-serif">
    <rect x="64" y="82" width="168" height="96" rx="14" fill="#ffffff" stroke="#7cb7de" stroke-width="2"/>
    <rect x="406" y="82" width="168" height="96" rx="14" fill="#ffffff" stroke="#7cb7de" stroke-width="2"/>
    <rect x="748" y="82" width="168" height="96" rx="14" fill="#ffffff" stroke="#7cb7de" stroke-width="2"/>
    <text x="148" y="127" text-anchor="middle" font-size="28" font-weight="700" fill="#16324f">Data</text>
    <text x="490" y="127" text-anchor="middle" font-size="28" font-weight="700" fill="#16324f">Function</text>
    <text x="832" y="127" text-anchor="middle" font-size="28" font-weight="700" fill="#16324f">Result</text>
    <line x1="244" y1="130" x2="390" y2="130" stroke="#3b8ec2" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="586" y1="130" x2="732" y2="130" stroke="#3b8ec2" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="317" y="106" text-anchor="middle" font-size="18" fill="#34678f">input</text>
    <text x="659" y="106" text-anchor="middle" font-size="18" fill="#34678f">output</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#3b8ec2"/>
    </marker>
  </defs>
</svg>
