<svg xmlns="http://www.w3.org/2000/svg" width="980" height="260" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">Pure function</title>
  <desc id="desc">Same input produces same output and does not affect external state.</desc>
  <rect width="980" height="260" rx="18" fill="#fffaf7"/>
  <g font-family="Arial, sans-serif">
    <circle cx="185" cy="130" r="62" fill="#ffffff" stroke="#f0a45d" stroke-width="3"/>
    <circle cx="490" cy="130" r="62" fill="#ffffff" stroke="#f0a45d" stroke-width="3"/>
    <circle cx="795" cy="130" r="62" fill="#ffffff" stroke="#f0a45d" stroke-width="3"/>
    <text x="185" y="137" text-anchor="middle" font-size="24" font-weight="700" fill="#9d5c1f">Input</text>
    <text x="490" y="137" text-anchor="middle" font-size="24" font-weight="700" fill="#9d5c1f">Pure</text>
    <text x="795" y="137" text-anchor="middle" font-size="24" font-weight="700" fill="#9d5c1f">Output</text>
    <path d="M247 130 C300 92, 368 92, 428 130" fill="none" stroke="#d97a27" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M552 130 C605 92, 673 92, 733 130" fill="none" stroke="#d97a27" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="490" y="206" text-anchor="middle" font-size="18" fill="#7b5a44">same input always returns same output</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#d97a27"/>
    </marker>
  </defs>
</svg>
